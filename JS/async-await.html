<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SAME CSS YOU LIKED EARLIER -->
    <style>
        body {
            background: linear-gradient(135deg, #3b82f6, #9333ea);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }

        .card-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            width: 350px;
        }

        .card-box h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }

        input {
            height: 45px;
        }

        #result {
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
    </style>

</head>

<body>

    <div class="card-box">
        <h2>Login Form</h2>

        <input type="text" placeholder="Email" id="x1" class="form-control mb-3">
        <input type="password" placeholder="Password" id="x2" class="form-control mb-3">

        <button id="btn" class="btn btn-primary w-100">Login</button>

        <p id="result"></p>
    </div>

</body>
</html>

<script src="login.js"></script>

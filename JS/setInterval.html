<div id="slider">
    
</div>

<style>
    div {
        width: 1000px;
        height: 300px;
        border: solid;
        margin: auto;
    }
</style>

<script>
    let count = 1;
    // setInterval - set many times 
    setInterval(() => {
        if(count==5) {count=1;}
        document.getElementById('slider').innerHTML= `
           SLIDER : ${count}
        `;
        count++;
    }, 1000);
</script>
